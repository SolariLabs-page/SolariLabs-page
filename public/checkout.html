<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOLARILAB · Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/jpeg" href="img/SLlogo.jpg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .shop-header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }
    .customer-nav-desktop {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .customer-greeting {
      color: var(--muted);
      font-size: 0.85rem;
    }
    .checkout-section-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }
    .checkout-section + .checkout-section {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="shop.html" class="brand">
      <img src="img/SLlogo.jpg" alt="SOLARILAB" class="brand-logo">
      <span class="brand-name">SOLARILAB</span>
    </a>

    <nav class="site-nav">
      <a href="shop.html" class="nav-link">← Volver a la tienda</a>
    </nav>

    <div class="shop-header-right">
      <div id="customer-nav-desktop" class="customer-nav-desktop"></div>
      <button class="cart-btn" id="cart-btn" aria-label="Carrito">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Carrito
        <span class="cart-count" id="cart-count" data-count="0">0</span>
      </button>
    </div>
  </div>
</header>

<main class="container">
  <div class="checkout-layout">

    <!-- Left: Order summary -->
    <div>
      <div class="checkout-card">
        <h3 class="checkout-card h3">Resumen del pedido</h3>
        <div id="order-items"></div>
        <div class="order-total-row">
          <span style="font-weight:500">Total</span>
          <span class="order-total-val" id="order-total">₡0</span>
        </div>
      </div>
    </div>

    <!-- Right: Checkout form -->
    <div>

      <!-- Shipping method -->
      <div class="checkout-card checkout-section">
        <p class="checkout-section-title">Método de envío</p>

        <label class="shipping-option" id="opt-correos">
          <input type="radio" name="shipping" value="correos" id="radio-correos">
          <div>
            <div class="shipping-label">Correos de Costa Rica</div>
            <div class="shipping-desc">Envío nacional, 3–5 días hábiles</div>
          </div>
        </label>

        <label class="shipping-option" id="opt-uber-rappi">
          <input type="radio" name="shipping" value="uber-rappi" id="radio-uber-rappi">
          <div>
            <div class="shipping-label">Uber Flash / Rappi</div>
            <div class="shipping-desc">Entrega el mismo día en GAM</div>
          </div>
        </label>

        <!-- Dirección para Correos de Costa Rica -->
        <div id="address-wrap" hidden style="margin-top:12px">
          <input type="text" id="shipping-address" placeholder="Ej: San José, Uruca, 200m norte del parque" style="width:100%">
          <div style="color:var(--muted);font-size:.8rem;margin-top:5px">Ingresá la dirección exacta de entrega</div>
        </div>

        <!-- Ubicación para Uber / Rappi -->
        <div class="location-btn-wrap" id="location-wrap" hidden>
          <button class="btn btn-ghost btn-sm" id="location-btn" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 13-8 13S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg>
            Compartir mi ubicación
          </button>
          <div id="location-status"></div>
        </div>
      </div>

      <!-- Notes -->
      <div class="checkout-card checkout-section">
        <p class="checkout-section-title">Nota del pedido</p>
        <textarea id="notes" rows="3" placeholder="¿Alguna indicación especial?" style="resize:vertical;width:100%"></textarea>
      </div>

      <!-- Submit -->
      <div style="margin-top:16px">
        <button class="btn btn-amber" id="submit-btn" style="width:100%;padding:14px;font-size:1rem">
          Realizar pedido →
        </button>
      </div>

    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    © 2025 SOLARILAB · Todos los derechos reservados
  </div>
</footer>

<div id="toast-container" class="toast-container"></div>

<script src="js/checkout.js"></script>
</body>
</html>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solarilab · CRM</title>
  <link rel="icon" type="image/jpeg" href="img/SLlogo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="orders.html" class="brand">
      <img src="img/SLlogo.jpg" alt="Solarilab" class="brand-logo">
      <span class="brand-name">SOLARILAB</span>
    </a>
    <nav class="site-nav">
      <a href="orders.html"    class="nav-link">Pedidos</a>
      <a href="dashboard.html" class="nav-link">Ventas</a>
      <a href="inventory.html" class="nav-link">Inventario</a>
      <a href="crm.html"       class="nav-link active">CRM</a>
    </nav>
  </div>
</header>

<main class="container">

  <div class="stats-row cols-3" style="margin-top:32px">
    <div class="stat-card">
      <span class="stat-label">Clientes registrados</span>
      <span class="stat-val" id="stat-customers">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Total en ventas</span>
      <span class="stat-val" id="stat-revenue">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Pedidos totales</span>
      <span class="stat-val" id="stat-orders">—</span>
    </div>
  </div>

  <section class="section">
    <div class="table-panel">
      <div class="table-toolbar">
        <input class="search-input" id="search" type="search" placeholder="Buscar por nombre o correo…">
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Pedidos</th>
              <th>Total comprado</th>
              <th>Miembro desde</th>
            </tr>
          </thead>
          <tbody id="crm-body"></tbody>
        </table>
      </div>
      <div id="crm-empty"   class="state-empty"   hidden>No hay clientes registrados.</div>
      <div id="crm-loading" class="state-loading">Cargando…</div>
    </div>
  </section>

</main>

<div id="toast-container" class="toast-container"></div>
<script src="js/auth.js"></script>
<script src="js/crm.js"></script>
</body>
</html>

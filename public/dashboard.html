<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOLARILAB · Ventas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="brand">
      <img src="img/SLlogo.jpg" alt="SOLARILAB" class="brand-logo">
      <span class="brand-name">SOLARILAB</span>
    </a>
    <nav class="site-nav">
      <a href="index.html"     class="nav-link">Tienda</a>
      <a href="dashboard.html" class="nav-link active">Ventas</a>
      <a href="inventory.html" class="nav-link">Inventario</a>
    </nav>
  </div>
</header>

<main class="container">

  <!-- KPI cards -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <span class="stat-label">Ingresos totales</span>
      <span class="stat-val" id="stat-revenue">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Ingresos hoy</span>
      <span class="stat-val" id="stat-today">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Unidades vendidas</span>
      <span class="stat-val" id="stat-units">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Total de pedidos</span>
      <span class="stat-val" id="stat-orders">—</span>
    </div>
  </div>

  <!-- 7-day chart -->
  <section class="section">
    <div class="chart-wrap">
      <p class="chart-title">Ingresos — últimos 7 días</p>
      <div class="chart-bars" id="chart-bars">
        <!-- generated by JS -->
      </div>
    </div>

    <!-- Sales history -->
    <div class="section-head">
      <h2 class="section-title">Historial de pedidos</h2>
    </div>

    <div class="table-panel">
      <div class="table-wrap">
        <table class="data-table" id="sales-table">
          <thead>
            <tr>
              <th>Pedido</th>
              <th>Fecha</th>
              <th>Productos</th>
              <th>Unidades</th>
              <th>Total</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="sales-body"></tbody>
        </table>
      </div>
      <div id="sales-empty" class="state-empty" hidden>Aún no hay ventas registradas.</div>
      <div id="sales-loading" class="state-loading">Cargando…</div>
    </div>
  </section>

</main>

<div id="toast-container" class="toast-container"></div>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOLARILAB · Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="img/SLlogo.jpg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }

    .login-wrap { width:100%; padding:24px; }

    .login-card {
      width: min(380px, 100%);
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 44px 36px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .login-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .login-brand {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.65rem;
      font-weight: 600;
      letter-spacing: 5px;
      color: var(--amber);
      text-transform: uppercase;
    }

    .login-sub {
      color: var(--muted);
      font-size: .85rem;
      margin-bottom: 16px;
    }

    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .login-error {
      color: var(--danger);
      font-size: .85rem;
      text-align: center;
      padding: 8px;
      background: rgba(192,48,48,.08);
      border-radius: var(--radius);
      border: 1px solid rgba(192,48,48,.25);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <img src="img/SLlogo.jpg" alt="SOLARILAB" class="login-logo">
      <span class="login-brand">SOLARILAB</span>
      <span class="login-sub">Panel de administración</span>

      <form class="login-form" id="login-form">
        <div class="field">
          <label>Contraseña</label>
          <div class="pwd-field">
            <input type="password" id="password" placeholder="••••••••" required autofocus>
            <button type="button" class="pwd-toggle" id="pwd-toggle-login" aria-label="Mostrar contraseña"></button>
          </div>
        </div>
        <div class="login-error" id="login-error" hidden></div>
        <button type="submit" class="btn btn-amber" style="width:100%;margin-top:4px" id="login-btn">
          Entrar
        </button>
      </form>
    </div>
  </div>

  <script>
    // Eye toggle helper
    const EYE_OPEN   = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
    const EYE_CLOSED = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`

    function setupEyeToggle(inputId, btnId) {
      const input = document.querySelector(inputId)
      const btn   = document.querySelector(btnId)
      if (!input || !btn) return
      btn.innerHTML = EYE_OPEN
      btn.addEventListener('click', () => {
        const show = input.type === 'password'
        input.type = show ? 'text' : 'password'
        btn.innerHTML = show ? EYE_CLOSED : EYE_OPEN
        btn.setAttribute('aria-label', show ? 'Ocultar contraseña' : 'Mostrar contraseña')
      })
    }

    // Si ya hay sesión activa, ir directo al panel
    if (localStorage.getItem('sl_token')) window.location.replace('index.html')

    document.addEventListener('DOMContentLoaded', () => {
      setupEyeToggle('#password', '#pwd-toggle-login')
    })

    document.querySelector('#login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn   = document.querySelector('#login-btn')
      const error = document.querySelector('#login-error')
      const pwd   = document.querySelector('#password').value

      btn.disabled = true
      btn.textContent = 'Entrando…'
      error.hidden = true

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ password: pwd }),
        })

        // Parsear con seguridad — si el servidor devuelve error HTML no explota
        const text = await res.text()
        let data = {}
        try { data = JSON.parse(text) } catch { /* respuesta no-JSON del servidor */ }

        if (!res.ok) throw new Error(data.error || `Error del servidor (${res.status})`)

        localStorage.setItem('sl_token', data.token)
        window.location.replace('index.html')
      } catch (err) {
        error.textContent = err.message
        error.hidden = false
        btn.disabled = false
        btn.textContent = 'Entrar'
      }
    })
  </script>
</body>
</html>

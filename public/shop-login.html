<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOLARILAB · Mi cuenta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/jpeg" href="img/SLlogo.jpg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }

    .login-wrap { width:100%; padding:24px; }

    .login-card {
      width: min(380px, 100%);
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 44px 36px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .login-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .login-brand {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.65rem;
      font-weight: 600;
      letter-spacing: 5px;
      color: var(--amber);
      text-transform: uppercase;
    }

    .login-sub {
      color: var(--muted);
      font-size: .85rem;
      margin-bottom: 16px;
    }

    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .login-error {
      color: var(--danger);
      font-size: .85rem;
      text-align: center;
      padding: 8px;
      background: rgba(192,48,48,.08);
      border-radius: var(--radius);
      border: 1px solid rgba(192,48,48,.25);
    }

    .login-footer {
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }

    .login-footer a {
      color: var(--amber);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .login-footer a:hover { color: var(--amber-l); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <img src="img/SLlogo.jpg" alt="SOLARILAB" class="login-logo">
      <span class="login-brand">SOLARILAB</span>
      <span class="login-sub">Mi cuenta</span>

      <form class="login-form" id="login-form">
        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email" autofocus>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div class="pwd-field">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="pwd-toggle" id="pwd-toggle" aria-label="Mostrar contraseña"></button>
          </div>
        </div>
        <div class="login-error" id="login-error" hidden></div>
        <button type="submit" class="btn btn-amber" style="width:100%;margin-top:4px" id="login-btn">
          Entrar
        </button>
      </form>

      <p class="login-footer">
        ¿No tenés cuenta? <a href="register.html" id="register-link">Registrate</a>
      </p>
    </div>
  </div>

  <script>
    const EYE_OPEN   = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
    const EYE_CLOSED = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`

    function setupEyeToggle(inputId, btnId) {
      const input = document.querySelector(inputId)
      const btn   = document.querySelector(btnId)
      if (!input || !btn) return
      btn.innerHTML = EYE_OPEN
      btn.addEventListener('click', () => {
        const show = input.type === 'password'
        input.type = show ? 'text' : 'password'
        btn.innerHTML = show ? EYE_CLOSED : EYE_OPEN
        btn.setAttribute('aria-label', show ? 'Ocultar contraseña' : 'Mostrar contraseña')
      })
    }

    // Get redirect param
    function getRedirect() {
      const params = new URLSearchParams(window.location.search)
      return params.get('redirect') || 'shop.html'
    }

    // Preserve redirect param on register link
    function updateRegisterLink() {
      const params = new URLSearchParams(window.location.search)
      const redirect = params.get('redirect')
      const link = document.querySelector('#register-link')
      if (link && redirect) {
        link.href = 'register.html?redirect=' + encodeURIComponent(redirect)
      }
    }

    // If already logged in as customer, redirect
    try {
      const existing = JSON.parse(localStorage.getItem('sl_customer') || 'null')
      if (existing && existing.token) window.location.replace(getRedirect())
    } catch { /* */ }

    document.addEventListener('DOMContentLoaded', () => {
      setupEyeToggle('#password', '#pwd-toggle')
      updateRegisterLink()
    })

    document.querySelector('#login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn   = document.querySelector('#login-btn')
      const error = document.querySelector('#login-error')
      const email = document.querySelector('#email').value.trim()
      const pwd   = document.querySelector('#password').value

      btn.disabled = true
      btn.textContent = 'Entrando…'
      error.hidden = true

      try {
        const res  = await fetch('api/customers/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password: pwd }),
        })

        const text = await res.text()
        let data = {}
        try { data = JSON.parse(text) } catch { /* non-JSON server response */ }

        if (!res.ok) throw new Error(data.error || `Error del servidor (${res.status})`)

        localStorage.setItem('sl_customer', JSON.stringify({
          name:  data.name  || data.customer?.name  || '',
          email: data.email || data.customer?.email || email,
          token: data.token,
        }))

        window.location.replace(getRedirect())
      } catch (err) {
        error.textContent = err.message
        error.hidden = false
        btn.disabled = false
        btn.textContent = 'Entrar'
      }
    })
  </script>
</body>
</html>
